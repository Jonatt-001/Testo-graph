<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Dashboard - GFox Git</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --bg-base: #0b1120;
            --surface: #151e32;
            --surface-hover: #1e293b;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --primary-dark: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: calc(90px + var(--safe-area-bottom));
            overflow-x: hidden;
        }

        /* --- Stargate Ambient Animation --- */
        .stargate-container {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }
        .stargate-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-top-color: rgba(59, 130, 246, 0.8);
            border-right-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15), inset 0 0 20px rgba(59, 130, 246, 0.05);
            animation: stargate-rotate 12s linear infinite;
        }
        .stargate-ring::before {
            content: '';
            position: absolute;
            inset: 12px;
            border-radius: 50%;
            border: 1px dashed rgba(59, 130, 246, 0.15);
            animation: stargate-rotate-reverse 18s linear infinite;
        }
        .stargate-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.3) 0%, transparent 70%);
            animation: stargate-pulse 4s ease-in-out infinite;
        }
        @keyframes stargate-rotate { 100% { transform: rotate(360deg); } }
        @keyframes stargate-rotate-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes stargate-pulse { 
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); } 
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.3); } 
        }

        /* Header */
        .dashboard-header {
            padding: calc(16px + var(--safe-area-top)) 24px 24px;
            background: rgba(11, 17, 32, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow: hidden;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .user-greeting {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .greeting-text h1 {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 3px;
        }

        .greeting-text p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
        }

        .icon-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--border-hover);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-btn svg { width: 20px; height: 20px; }

        /* Stats Cards */
        .stats-section { padding: 24px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 12px;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-card:hover::before { opacity: 1; }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }

        .stat-icon svg { width: 18px; height: 18px; color: var(--primary); }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
            background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* Quick Actions */
        .quick-actions { padding: 0 24px 32px; }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .section-title svg { width: 18px; height: 18px; color: var(--primary); }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .action-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 12px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 13px;
            letter-spacing: -0.01em;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
        }

        .action-btn:active { transform: scale(0.96); }

        .action-btn svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .action-btn:hover svg { transform: scale(1.1); }

        /* Recent Repos */
        .recent-section { padding: 0 24px 32px; }

        .recent-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .view-all {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: -0.01em;
        }

        .view-all:hover { opacity: 0.8; }

        .repo-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .repo-card:hover {
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .repo-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .repo-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-visibility {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .repo-visibility.public {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .repo-visibility.private {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .repo-description {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 14px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .meta-item svg { width: 14px; height: 14px; opacity: 0.7; }

        /* Activity Timeline */
        .activity-section { padding: 0 24px 32px; }

        .activity-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
        }

        .activity-item {
            display: flex;
            gap: 16px;
            padding-bottom: 18px;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        .activity-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            margin-top: 5px;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--primary-glow);
            position: relative;
        }

        .activity-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .activity-content { flex: 1; }

        .activity-text {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .activity-text strong { color: var(--text-main); font-weight: 600; }

        .activity-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 17, 32, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            padding: 12px 24px calc(12px + var(--safe-area-bottom));
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
            position: relative;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -12px;
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 4px 8px var(--primary-glow);
        }

        .nav-item svg { width: 24px; height: 24px; transition: transform 0.2s ease; }
        .nav-item:active svg { transform: scale(0.9); }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: calc(90px + var(--safe-area-bottom));
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
        }

        .fab:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(59, 130, 246, 0.5);
        }

        .fab:active { transform: scale(0.95); }
        .fab svg { width: 24px; height: 24px; }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-icon svg { width: 36px; height: 36px; color: var(--text-muted); }

        .empty-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .empty-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; gap: 10px; }
            .stat-card { display: flex; align-items: center; gap: 16px; padding: 16px; }
            .stat-icon { margin-bottom: 0; }
            .action-buttons { grid-template-columns: 1fr; }
            .action-btn { flex-direction: row; justify-content: flex-start; padding: 16px 20px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="dashboard-header">
        <div class="stargate-container">
            <div class="stargate-ring"></div>
            <div class="stargate-core"></div>
        </div>
        <div class="header-content">
            <div class="user-greeting">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="greeting-text">
                    <h1>Welcome back, <span id="user-name">User</span></h1>
                    <p id="current-date">Today</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" onclick="window.location.href='settings.html'" aria-label="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Stats Section -->
    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div>
                    <div class="stat-value" id="stat-repos">-</div>
                    <div class="stat-label">Repositories</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div>
                    <div class="stat-value" id="stat-commits">-</div>
                    <div class="stat-label">Est. Commits</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <div>
                    <div class="stat-value" id="stat-storage">-</div>
                    <div class="stat-label">Storage (MB)</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Quick Actions -->
    <section class="quick-actions">
        <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Quick Actions
        </div>
        <div class="action-buttons">
            <button class="action-btn" onclick="window.location.href='explorer.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                View Repos
            </button>
            <button class="action-btn" onclick="window.location.href='explorer.html?action=upload'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload File
            </button>
            <button class="action-btn" onclick="alert('Clone feature coming soon!')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 17l5-5-5-5M8 7l-5 5 5 5m9-10l-9 9"/></svg>
                Clone Repo
            </button>
        </div>
    </section>

    <!-- Recent Repositories -->
    <section class="recent-section">
        <div class="recent-header">
            <div class="section-title" style="margin-bottom: 0;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                Recent Repositories
            </div>
            <div class="view-all" onclick="window.location.href='explorer.html'">View All →</div>
        </div>
        <div id="recent-repos">
            <!-- Dynamic content -->
        </div>
    </section>

    <!-- Recent Activity -->
    <section class="activity-section">
        <div class="section-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Recent Activity
        </div>
        <div class="activity-card">
            <div class="activity-item">
                <div class="activity-dot"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='indexhtml'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <div class="nav-item" onclick="window.location.href='settings.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

    <!-- Floating Action Button -->
    <button class="fab" onclick="window.location.href='explorer.html?action=new'" aria-label="Create New">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>

    <script>
        let userData = { login: '', avatar: '' };
        let userRepos = [];

        async function init() {
            try {
                const res = await fetch('/api/token', { credentials: 'include' });
                if (!res.ok) {
                    window.location.replace('login.html');
                    return;
                }

                const data = await res.json();
                const token = data.token;

                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `token ${token}` }
                });
                userData = await userRes.json();

                document.getElementById('user-name').textContent = userData.login;
                document.getElementById('user-avatar').textContent = userData.login.charAt(0).toUpperCase();
                
                const options = { weekday: 'long', month: 'short', day: 'numeric' };
                document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);

                const reposRes = await fetch(`https://api.github.com/users/${userData.login}/repos?per_page=100`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                userRepos = await reposRes.json();

                updateStats();
                showRecentRepos();
                animateEntrance();

            } catch (err) {
                console.error('Init error:', err);
                window.location.replace('index.html');
            }
        }

        function updateStats() {
            animateValue('stat-repos', 0, userRepos.length, 1200);
            const totalCommits = userRepos.reduce((acc, repo) => acc + (repo.size / 100), 0);
            animateValue('stat-commits', 0, Math.floor(totalCommits), 1200);
            const totalSize = userRepos.reduce((acc, repo) => acc + repo.size, 0);
            const sizeInMB = (totalSize / 1024).toFixed(1);
            document.getElementById('stat-storage').textContent = `${sizeInMB}`;
        }

        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            const range = end - start;
            const minTimer = 50;
            let stepTime = Math.abs(Math.floor(duration / range));
            stepTime = Math.max(stepTime, minTimer);
            let startTime = new Date().getTime();
            let endTime = startTime + duration;
            let timer;
          
            function run() {
                let now = new Date().getTime();
                let remaining = Math.max((endTime - now) / duration, 0);
                let value = Math.round(end - (remaining * range));
                obj.textContent = value;
                if (value == end) clearInterval(timer);
            }
            timer = setInterval(run, stepTime);
            run();
        }

        function showRecentRepos() {
            const container = document.getElementById('recent-repos');
            const recent = userRepos.slice(0, 3);

            if (recent.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <div class="empty-title">No repositories yet</div>
                        <div class="empty-text">Create your first repository to get started building.</div>
                        <button class="action-btn" onclick="window.location.href='explorer.html?action=new'" style="display: inline-flex; padding: 14px 28px; width: auto;">
                            Create Repository
                        </button>
                    </div>
                `;
                return;
            }

            container.innerHTML = recent.map(repo => `
                <div class="repo-card" onclick="window.location.href='explorer.html?repo=${repo.name}'">
                    <div class="repo-header">
                        <div class="repo-name">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;color:var(--primary);">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                            ${repo.name}
                        </div>
                        <span class="repo-visibility ${repo.private ? 'private' : 'public'}">
                            ${repo.private ? 'Private' : 'Public'}
                        </span>
                    </div>
                    <div class="repo-description">${repo.description || 'No description provided for this repository.'}</div>
                    <div class="repo-meta">
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            ${repo.stargazers_count}
                        </div>
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
                            ${repo.language || 'Code'}
                        </div>
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            ${timeAgo(repo.updated_at)}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function animateEntrance() {
            gsap.from('.stat-card', { y: 20, opacity: 0, duration: 0.8, stagger: 0.1, ease: 'expo.out' });
            gsap.from('.action-btn', { y: 20, opacity: 0, duration: 0.8, stagger: 0.1, delay: 0.2, ease: 'expo.out' });
            gsap.from('.repo-card', { x: -20, opacity: 0, duration: 0.8, stagger: 0.1, delay: 0.4, ease: 'expo.out' });
            gsap.from('.activity-item', { x: -20, opacity: 0, duration: 0.8, stagger: 0.1, delay: 0.6, ease: 'expo.out' });
            gsap.from('.fab', { scale: 0, duration: 0.8, delay: 0.8, ease: 'back.out(1.7)' });
        }

        window.addEventListener('pageshow', function (event) {
            if (event.persisted) init();
        });

        init();
    </script>
</body>
