<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0e27">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Private Repositories - GFox Git</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../geefox.css">
    
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --bg-tertiary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.12);
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 16px;
            --radius-lg: 20px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .header-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* Main Content */
        .content {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        /* Search & Stats Bar */
        .controls-bar {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .search-container {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px 14px 48px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #fca5a5;
            width: fit-content;
        }

        /* Repo List */
        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .repo-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s var(--transition-smooth);
            animation: slideUp 0.4s var(--transition-smooth) backwards;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--danger), var(--warning));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .repo-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-light);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        .repo-card:hover::before {
            opacity: 1;
        }

        .repo-card:active {
            transform: translateY(-2px) scale(0.99);
        }

        .repo-card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .repo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fca5a5;
            flex-shrink: 0;
        }

        .repo-info {
            flex: 1;
            min-width: 0;
        }

        .repo-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .private-badge {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.2);
            padding: 2px 8px;
            border-radius: 6px;
        }

        .repo-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-tertiary);
        }

        .meta-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            animation: slideUp 0.4s var(--transition-smooth);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            animation: float 6s ease-in-out infinite;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            line-height: 1.6;
            max-width: 300px;
            margin: 0 auto 24px;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        /* Pull to Refresh */
        .pull-refresh {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        .pull-refresh.show {
            display: block;
            animation: fadeIn 0.3s var(--transition-smooth);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .content { padding: 16px; }
            .repo-meta { gap: 12px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="header-btn" onclick="window.location.href='index.html'" aria-label="Back to Dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="header-title">Private Repositories</h1>
        </div>
        <button class="header-btn" onclick="window.location.href='settings.html'" aria-label="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68 1.65 1.65 0 0 0 10 3.17V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
    </header>

    <!-- Main Content -->
    <main class="content">
        <div class="controls-bar">
            <div class="stats-badge" id="stats-badge" style="display: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <span id="repo-count">0</span> Private Repositories
            </div>
            
            <div class="search-container">
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" id="search-input" placeholder="Search private repositories..." oninput="filterRepos()">
            </div>
        </div>

        <div class="pull-refresh" id="pull-refresh">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:10px;animation:spin 1s linear infinite">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Pull to refresh
        </div>

        <div class="repo-list" id="repo-list">
            <!-- Dynamically populated -->
            <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                <div style="display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 12px;">Loading private repositories...</p>
            </div>
        </div>
    </main>

    <script>
        // State
        let state = {
            owner: '',
            token: '',
            allPrivateRepos: []
        };

        // Language colors mapping
        const languageColors = {
            JavaScript: '#f1e05a', TypeScript: '#2b7489', Python: '#3572A5',
            Java: '#b07219', Go: '#00ADD8', Rust: '#dea584', Ruby: '#701516',
            HTML: '#e34c26', CSS: '#563d7c', Shell: '#89e051', C: '#555555',
            'C++': '#f34b7d', PHP: '#4F5D95', Swift: '#ffac45', Vue: '#41b883',
            Dart: '#00B4AB', Kotlin: '#A97BFF', Jupyter: '#DA5B0B'
        };

        // Initialize
        async function init() {
            try {
                const res = await fetch('/api/token', { credentials: 'include' });
                if (!res.ok) throw new Error('Auth failed');
                const data = await res.json();
                state.token = data.token;
                
                const userRes = await fetch('https://api.github.com/user', { 
                    headers: { 'Authorization': `token ${state.token}` } 
                });
                const userData = await userRes.json();
                state.owner = userData.login;

                await loadPrivateRepos();
            } catch (err) {
                console.error('Auth check failed', err);
                window.location.href = '../login.html';
            }
        }

        // Load Private Repos
        async function loadPrivateRepos() {
            const list = document.getElementById('repo-list');
            list.innerHTML = `
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    <div style="display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <p style="margin-top: 12px;">Loading private repositories...</p>
                </div>
            `;

            try {
                // Fetch only private repositories
                const response = await fetch(`https://api.github.com/user/repos?visibility=private&sort=updated&per_page=100`, {
                    headers: {
                        'Authorization': `token ${state.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) throw new Error(`API error: ${response.status}`);
                
                state.allPrivateRepos = await response.json();
                renderRepos(state.allPrivateRepos);
                
            } catch (err) {
                console.error('Failed to load private repos:', err);
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                            </svg>
                        </div>
                        <div class="empty-title">Failed to Load</div>
                        <div class="empty-desc">${err.message}</div>
                        <button class="btn-primary" onclick="loadPrivateRepos()">Try Again</button>
                    </div>
                `;
            }
        }

        // Render Repos
        function renderRepos(repos) {
            const list = document.getElementById('repo-list');
            const statsBadge = document.getElementById('stats-badge');
            const repoCount = document.getElementById('repo-count');

            if (repos.length === 0) {
                statsBadge.style.display = 'none';
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </div>
                        <div class="empty-title">No Private Repositories</div>
                        <div class="empty-desc">You don't have any private repositories yet. Create one to get started.</div>
                        <a href="index.html" class="btn-primary" onclick="setTimeout(() => {
                            const createBtn = document.querySelector('.nav-btn.primary');
                            if (createBtn) createBtn.click();
                        }, 100)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Create Repository
                        </a>
                    </div>
                `;
                return;
            }

            statsBadge.style.display = 'inline-flex';
            repoCount.textContent = repos.length;

            list.innerHTML = repos.map((repo, index) => {
                const lang = repo.language || 'Unknown';
                const langColor = languageColors[lang] || '#9ca3af';
                
                return `
                    <div class="repo-card" style="animation-delay: ${index * 0.05}s" onclick="window.location.href='explorer.html?repo=${encodeURIComponent(repo.name)}&branch=${encodeURIComponent(repo.default_branch)}'">
                        <div class="repo-card-header">
                            <div class="repo-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </div>
                            <div class="repo-info">
                                <h3 class="repo-name">
                                    ${repo.name}
                                    <span class="private-badge">Private</span>
                                </h3>
                                <p class="repo-desc">${repo.description || 'No description provided for this repository.'}</p>
                            </div>
                        </div>
                        <div class="repo-meta">
                            <span class="meta-item">
                                <span class="lang-dot" style="background: ${langColor}"></span>
                                ${lang}
                            </span>
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                </svg>
                                ${repo.stargazers_count.toLocaleString()}
                            </span>
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/>
                                </svg>
                                ${repo.forks_count.toLocaleString()}
                            </span>
                            <span class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                                </svg>
                                ${timeAgo(repo.updated_at)}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filter Repos
        function filterRepos() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = state.allPrivateRepos.filter(repo => 
                repo.name.toLowerCase().includes(query) || 
                (repo.description && repo.description.toLowerCase().includes(query))
            );
            renderRepos(filtered);
        }

        // Time Ago Helper
        function timeAgo(dateString) {
            const seconds = Math.floor((new Date() - new Date(dateString)) / 1000);
            const intervals = [
                { label: 'y', seconds: 31536000 },
                { label: 'mo', seconds: 2592000 },
                { label: 'd', seconds: 86400 },
                { label: 'h', seconds: 3600 },
                { label: 'm', seconds: 60 }
            ];
            for (const interval of intervals) {
                const count = Math.floor(seconds / interval.seconds);
                if (count >= 1) return `${count}${interval.label} ago`;
            }
            return 'just now';
        }

        // Pull to Refresh Logic
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            if (window.scrollY === 0) touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', e => {
            if (window.scrollY === 0 && touchStartY) {
                if (e.touches[0].clientY - touchStartY > 100) {
                    document.getElementById('pull-refresh').classList.add('show');
                }
            }
        });

        document.addEventListener('touchend', () => {
            if (document.getElementById('pull-refresh').classList.contains('show')) {
                document.getElementById('pull-refresh').classList.remove('show');
                loadPrivateRepos();
            }
            touchStartY = 0;
        });

        // Spin animation
        const style = document.createElement('style');
        style.textContent = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
        document.head.appendChild(style);

        // Initialize
        init();
    </script>
</body>
</html>
